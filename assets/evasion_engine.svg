<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300">
  <defs>
    <linearGradient id="eBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/><stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="eAcc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6ec7"/><stop offset="50%" style="stop-color:#f87171"/><stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <filter id="eg"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="egr" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1a1a3a" stroke-width="0.3"/>
    </pattern>
  </defs>

  <rect width="900" height="300" fill="url(#eBg)" rx="10"/>
  <rect width="900" height="300" fill="url(#egr)" rx="10"/>
  <rect x="1" y="1" width="898" height="298" fill="none" stroke="url(#eAcc)" stroke-width="1" rx="10" opacity="0.3"/>

  <text x="450" y="32" text-anchor="middle" font-family="monospace" font-size="13" fill="#ff6ec7" font-weight="bold" letter-spacing="4">EVASION DETECTION ENGINE</text>
  <line x1="200" y1="44" x2="700" y2="44" stroke="#ff6ec7" stroke-width="0.5" opacity="0.3"/>

  <!-- Syscall Detection -->
  <g transform="translate(50, 65)">
    <rect width="185" height="105" rx="6" fill="#0d1117" stroke="#5eead4" stroke-width="1"/>
    <rect width="185" height="3" rx="1.5" fill="#5eead4" opacity="0.5"/>
    <text x="92" y="22" text-anchor="middle" font-family="monospace" font-size="10" fill="#5eead4" font-weight="bold">◈ Syscall Analysis</text>
    <text x="15" y="42" font-family="monospace" font-size="8" fill="#888">Direct   → Nt* execution</text>
    <text x="15" y="57" font-family="monospace" font-size="8" fill="#888">Indirect → ntdll trampoline</text>
    <text x="15" y="72" font-family="monospace" font-size="8" fill="#888">Gate     → BeaconGate proxy</text>
    <text x="15" y="92" font-family="monospace" font-size="8" fill="#5eead4">✓ 0F 05 / syscall detect</text>
    <!-- Animated indicator -->
    <circle cx="170" cy="85" r="5" fill="#5eead4" opacity="0.6">
      <animate attributeName="r" values="3;6;3" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Sleep Mask -->
  <g transform="translate(255, 65)">
    <rect width="185" height="105" rx="6" fill="#0d1117" stroke="#a77de5" stroke-width="1"/>
    <rect width="185" height="3" rx="1.5" fill="#a77de5" opacity="0.5"/>
    <text x="92" y="22" text-anchor="middle" font-family="monospace" font-size="10" fill="#a77de5" font-weight="bold">◆ Sleep Mask</text>
    <text x="15" y="42" font-family="monospace" font-size="8" fill="#888">Heap Masking  (4.5+)</text>
    <text x="15" y="57" font-family="monospace" font-size="8" fill="#888">BOF 8KB/16KB  (4.7+)</text>
    <text x="15" y="72" font-family="monospace" font-size="8" fill="#888">Stack Spoof   (4.8+)</text>
    <text x="15" y="87" font-family="monospace" font-size="8" fill="#888">32KB Buffer   (4.10+)</text>
    <text x="15" y="102" font-family="monospace" font-size="8" fill="#a77de5">✓ GARGLE_NOOK detect</text>
  </g>

  <!-- Injection -->
  <g transform="translate(460, 65)">
    <rect width="185" height="105" rx="6" fill="#0d1117" stroke="#ff6ec7" stroke-width="1"/>
    <rect width="185" height="3" rx="1.5" fill="#ff6ec7" opacity="0.5"/>
    <text x="92" y="22" text-anchor="middle" font-family="monospace" font-size="10" fill="#ff6ec7" font-weight="bold">⊕ Injection Analysis</text>
    <text x="15" y="42" font-family="monospace" font-size="8" fill="#888">VirtualAllocEx   (default)</text>
    <text x="15" y="57" font-family="monospace" font-size="8" fill="#888">NtMapViewOfFile  (stealth)</text>
    <text x="15" y="72" font-family="monospace" font-size="8" fill="#888">BOF Allocator    (heap)</text>
    <text x="15" y="87" font-family="monospace" font-size="8" fill="#888">CFG-Caution      (stable)</text>
    <text x="15" y="102" font-family="monospace" font-size="8" fill="#ff6ec7">✓ spawn-to analysis</text>
  </g>

  <!-- OPSEC Score -->
  <g transform="translate(665, 65)">
    <rect width="185" height="105" rx="6" fill="#0d1117" stroke="#fbbf24" stroke-width="1"/>
    <rect width="185" height="3" rx="1.5" fill="#fbbf24" opacity="0.5"/>
    <text x="92" y="22" text-anchor="middle" font-family="monospace" font-size="10" fill="#fbbf24" font-weight="bold">⟐ OPSEC Advisor</text>
    <text x="15" y="42" font-family="monospace" font-size="8" fill="#888">11 security rules</text>
    <text x="15" y="57" font-family="monospace" font-size="8" fill="#888">Severity weighting</text>
    <text x="15" y="72" font-family="monospace" font-size="8" fill="#888">Hardening score %</text>
    <text x="15" y="87" font-family="monospace" font-size="8" fill="#888">Fix recommendations</text>
    <text x="15" y="102" font-family="monospace" font-size="8" fill="#fbbf24">✓ version-gated checks</text>
    <!-- Score gauge animation -->
    <g transform="translate(140, 55)">
      <rect x="0" y="0" width="30" height="8" rx="4" fill="#1a1a3a"/>
      <rect x="0" y="0" width="0" height="8" rx="4" fill="#5eead4">
        <animate attributeName="width" values="0;28;28;0" dur="4s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- Bottom summary bar -->
  <g transform="translate(50, 195)">
    <rect width="800" height="90" rx="6" fill="#0d1117" stroke="#7b8cff" stroke-width="0.8" opacity="0.7"/>
    <text x="400" y="22" text-anchor="middle" font-family="monospace" font-size="10" fill="#7b8cff" font-weight="bold" letter-spacing="2">VERSION FEATURE AUDIT — 31 FEATURES TRACKED</text>
    <!-- Feature categories -->
    <g transform="translate(30, 40)">
      <rect width="10" height="10" rx="2" fill="#5eead4" opacity="0.8"/><text x="16" y="9" font-family="monospace" font-size="8" fill="#888">Evasion</text>
      <rect x="80" width="10" height="10" rx="2" fill="#f87171" opacity="0.8"/><text x="96" y="9" font-family="monospace" font-size="8" fill="#888">Injection</text>
      <rect x="170" width="10" height="10" rx="2" fill="#7b8cff" opacity="0.8"/><text x="186" y="9" font-family="monospace" font-size="8" fill="#888">Comms</text>
      <rect x="240" width="10" height="10" rx="2" fill="#a77de5" opacity="0.8"/><text x="256" y="9" font-family="monospace" font-size="8" fill="#888">Post-Ex</text>
      <rect x="320" width="10" height="10" rx="2" fill="#5eead4" opacity="0.8"/><text x="336" y="9" font-family="monospace" font-size="8" fill="#888">Resilience</text>
      <rect x="410" width="10" height="10" rx="2" fill="#fbbf24" opacity="0.8"/><text x="426" y="9" font-family="monospace" font-size="8" fill="#888">Efficiency</text>
      <rect x="500" width="10" height="10" rx="2" fill="#d35fd6" opacity="0.8"/><text x="516" y="9" font-family="monospace" font-size="8" fill="#888">Customize</text>
      <rect x="590" width="10" height="10" rx="2" fill="#7b8cff" opacity="0.8"/><text x="606" y="9" font-family="monospace" font-size="8" fill="#888">Pivoting</text>
      <rect x="670" width="10" height="10" rx="2" fill="#5eead4" opacity="0.8"/><text x="686" y="9" font-family="monospace" font-size="8" fill="#888">OPSEC</text>
    </g>
    <!-- Version coverage bar -->
    <g transform="translate(30, 62)">
      <text x="0" y="9" font-family="monospace" font-size="8" fill="#555">CS 4.5</text>
      <rect x="50" y="0" width="700" height="12" rx="6" fill="#1a1a3a"/>
      <rect x="50" y="0" width="120" height="12" rx="6" fill="#5eead4" opacity="0.3"/>
      <rect x="170" y="0" width="80" height="12" rx="0" fill="#7b8cff" opacity="0.3"/>
      <rect x="250" y="0" width="100" height="12" rx="0" fill="#a77de5" opacity="0.3"/>
      <rect x="350" y="0" width="110" height="12" rx="0" fill="#d35fd6" opacity="0.3"/>
      <rect x="460" y="0" width="120" height="12" rx="0" fill="#ff6ec7" opacity="0.3"/>
      <rect x="580" y="0" width="170" height="12" rx="6" fill="#f87171" opacity="0.3"/>
      <text x="100" y="10" text-anchor="middle" font-family="monospace" font-size="7" fill="#ccc">4.5-4.6</text>
      <text x="210" y="10" text-anchor="middle" font-family="monospace" font-size="7" fill="#ccc">4.7</text>
      <text x="300" y="10" text-anchor="middle" font-family="monospace" font-size="7" fill="#ccc">4.8</text>
      <text x="405" y="10" text-anchor="middle" font-family="monospace" font-size="7" fill="#ccc">4.9</text>
      <text x="520" y="10" text-anchor="middle" font-family="monospace" font-size="7" fill="#ccc">4.10</text>
      <text x="665" y="10" text-anchor="middle" font-family="monospace" font-size="7" fill="#ccc">4.11+</text>
    </g>
  </g>
</svg>
