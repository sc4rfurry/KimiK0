<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
  <defs>
    <linearGradient id="pbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/><stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="pac" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5eead4"/><stop offset="50%" style="stop-color:#a77de5"/><stop offset="100%" style="stop-color:#ff6ec7"/>
    </linearGradient>
    <pattern id="pgr" width="25" height="25" patternUnits="userSpaceOnUse">
      <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#1a1a3a" stroke-width="0.3"/>
    </pattern>
  </defs>

  <rect width="900" height="420" fill="url(#pbg)" rx="10"/>
  <rect width="900" height="420" fill="url(#pgr)" rx="10"/>
  <rect x="1" y="1" width="898" height="418" fill="none" stroke="url(#pac)" stroke-width="1" rx="10" opacity="0.3"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-family="monospace" font-size="14" fill="#a77de5" font-weight="bold" letter-spacing="3">AVAILABLE PLUGINS</text>
  <line x1="100" y1="44" x2="800" y2="44" stroke="#a77de5" stroke-width="0.5" opacity="0.3"/>

  <!-- Table Header -->
  <rect x="30" y="55" width="840" height="22" rx="3" fill="#1a1a3a" opacity="0.6"/>
  <g font-family="monospace" font-size="10" fill="#888" font-weight="bold">
    <text x="45" y="70">Name</text>
    <text x="250" y="70">Version</text>
    <text x="330" y="70">Hooks</text>
    <text x="590" y="70">Description</text>
  </g>

  <!-- Row 1: shellcode_fingerprinter -->
  <line x1="30" y1="82" x2="870" y2="82" stroke="#222" stroke-width="0.5"/>
  <g font-family="monospace" font-size="11">
    <text x="45" y="100" fill="#5eead4" font-weight="bold">shellcode_fingerprinter</text>
    <text x="250" y="100" fill="#888">2.0.0</text>
    <text x="330" y="100" fill="#a77de5">on_payload_loaded</text><text x="480" y="100" fill="#a77de5">on_pe_parsed</text><text x="560" y="100" fill="#a77de5">on_config</text>
    <text x="640" y="100" fill="#555">Loader, syscall, evasion fingerprinting</text>
  </g>

  <!-- Row 2: flow_analyzer -->
  <line x1="30" y1="112" x2="870" y2="112" stroke="#222" stroke-width="0.5"/>
  <rect x="30" y="112" width="840" height="30" fill="#1a1a3a" opacity="0.2"/>
  <g font-family="monospace" font-size="11">
    <text x="45" y="132" fill="#7b8cff" font-weight="bold">flow_analyzer</text>
    <text x="250" y="132" fill="#888">1.0.0</text>
    <text x="330" y="132" fill="#a77de5">on_payload_loaded</text><text x="480" y="132" fill="#a77de5">on_pe_parsed</text><text x="560" y="132" fill="#a77de5">on_config</text>
    <text x="640" y="132" fill="#555">Capstone disassembly + flow graph</text>
  </g>

  <!-- Row 3: entropy_analyzer -->
  <line x1="30" y1="142" x2="870" y2="142" stroke="#222" stroke-width="0.5"/>
  <g font-family="monospace" font-size="11">
    <text x="45" y="162" fill="#a77de5" font-weight="bold">entropy_analyzer</text>
    <text x="250" y="162" fill="#888">2.0.0</text>
    <text x="330" y="162" fill="#a77de5">on_payload_loaded</text><text x="480" y="162" fill="#a77de5">on_pe_parsed</text>
    <text x="640" y="162" fill="#555">Rolling entropy + heatmap</text>
  </g>

  <!-- Row 4: config_differ -->
  <line x1="30" y1="172" x2="870" y2="172" stroke="#222" stroke-width="0.5"/>
  <rect x="30" y="172" width="840" height="30" fill="#1a1a3a" opacity="0.2"/>
  <g font-family="monospace" font-size="11">
    <text x="45" y="192" fill="#d35fd6" font-weight="bold">config_differ</text>
    <text x="250" y="192" fill="#888">3.0.0</text>
    <text x="330" y="192" fill="#a77de5">on_config_extracted</text>
    <text x="640" y="192" fill="#555">Config diff vs defaults + OPSEC</text>
  </g>

  <!-- Row 5: version_audit -->
  <line x1="30" y1="202" x2="870" y2="202" stroke="#222" stroke-width="0.5"/>
  <g font-family="monospace" font-size="11">
    <text x="45" y="222" fill="#ff6ec7" font-weight="bold">version_audit</text>
    <text x="250" y="222" fill="#888">1.0.0</text>
    <text x="330" y="222" fill="#a77de5">on_config_extracted</text>
    <text x="640" y="222" fill="#555">31-feature audit + OPSEC advisor</text>
  </g>

  <!-- Row 6: pe_analyzer -->
  <line x1="30" y1="232" x2="870" y2="232" stroke="#222" stroke-width="0.5"/>
  <rect x="30" y="232" width="840" height="30" fill="#1a1a3a" opacity="0.2"/>
  <g font-family="monospace" font-size="11">
    <text x="45" y="252" fill="#5eead4" font-weight="bold">pe_analyzer</text>
    <text x="250" y="252" fill="#888">2.0.0</text>
    <text x="330" y="252" fill="#a77de5">on_pe_parsed</text>
    <text x="640" y="252" fill="#555">Sections, RWX audit, rich header</text>
  </g>

  <!-- Row 7: yara_scanner -->
  <line x1="30" y1="262" x2="870" y2="262" stroke="#222" stroke-width="0.5"/>
  <g font-family="monospace" font-size="11">
    <text x="45" y="282" fill="#fbbf24" font-weight="bold">yara_scanner</text>
    <text x="250" y="282" fill="#888">2.0.0</text>
    <text x="330" y="282" fill="#a77de5">on_payload_loaded</text>
    <text x="640" y="282" fill="#555">20+ CS rules + MITRE ATT&amp;CK</text>
  </g>

  <!-- Row 8: ioc_extractor -->
  <line x1="30" y1="292" x2="870" y2="292" stroke="#222" stroke-width="0.5"/>
  <rect x="30" y="292" width="840" height="30" fill="#1a1a3a" opacity="0.2"/>
  <g font-family="monospace" font-size="11">
    <text x="45" y="312" fill="#f87171" font-weight="bold">ioc_extractor</text>
    <text x="250" y="312" fill="#888">2.0.0</text>
    <text x="330" y="312" fill="#a77de5">on_pe_parsed</text><text x="440" y="312" fill="#a77de5">on_config_extracted</text>
    <text x="640" y="312" fill="#555">IOC engine: STIX/MISP/CSV export</text>
  </g>

  <!-- Row 9: udrl_packer -->
  <line x1="30" y1="322" x2="870" y2="322" stroke="#222" stroke-width="0.5"/>
  <g font-family="monospace" font-size="11">
    <text x="45" y="342" fill="#7b8cff" font-weight="bold">udrl_packer</text>
    <text x="250" y="342" fill="#888">2.0.0</text>
    <text x="330" y="342" fill="#a77de5">on_manifest_ready</text>
    <text x="640" y="342" fill="#555">UDRL feasibility + PIC-safety</text>
  </g>
  <line x1="30" y1="352" x2="870" y2="352" stroke="#222" stroke-width="0.5"/>

  <!-- Footer summary -->
  <text x="450" y="380" text-anchor="middle" font-family="monospace" font-size="11" fill="#555">9 plugins · 4 event hooks · auto-discovered · protocol-validated · isolated execution</text>
  <g transform="translate(450, 400)">
    <rect x="-80" y="-11" width="40" height="16" rx="8" fill="none" stroke="#5eead4" stroke-width="0.5" opacity="0.5"/>
    <text x="-60" y="2" text-anchor="middle" font-family="monospace" font-size="8" fill="#5eead4">builtin</text>
    <text x="-20" y="2" font-family="monospace" font-size="9" fill="#555">= shipped with framework</text>
    <rect x="130" y="-11" width="46" height="16" rx="8" fill="none" stroke="#fbbf24" stroke-width="0.5" opacity="0.5"/>
    <text x="153" y="2" text-anchor="middle" font-family="monospace" font-size="8" fill="#fbbf24">custom</text>
    <text x="190" y="2" font-family="monospace" font-size="9" fill="#555">= --plugin-dir</text>
  </g>
</svg>
