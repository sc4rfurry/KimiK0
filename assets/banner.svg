<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 250">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5eead4"/>
      <stop offset="25%" style="stop-color:#7b8cff"/>
      <stop offset="50%" style="stop-color:#a77de5"/>
      <stop offset="75%" style="stop-color:#d35fd6"/>
      <stop offset="100%" style="stop-color:#ff6ec7"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6ec7"/>
      <stop offset="50%" style="stop-color:#a77de5"/>
      <stop offset="100%" style="stop-color:#5eead4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Animated scan line -->
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5eead4;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#5eead4;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#5eead4;stop-opacity:0"/>
    </linearGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1a1a3a" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <!-- Hex pattern -->
    <pattern id="hexBg" width="60" height="60" patternUnits="userSpaceOnUse">
      <text x="5" y="15" font-family="monospace" font-size="8" fill="#1a1a3a" opacity="0.3">4D 5A</text>
      <text x="30" y="35" font-family="monospace" font-size="8" fill="#1a1a3a" opacity="0.2">FF 15</text>
      <text x="10" y="55" font-family="monospace" font-size="8" fill="#1a1a3a" opacity="0.25">90 90</text>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="250" fill="url(#bgGrad)" rx="12"/>
  <rect width="900" height="250" fill="url(#grid)" rx="12"/>
  <rect width="900" height="250" fill="url(#hexBg)" rx="12"/>

  <!-- Animated scan line -->
  <rect x="0" y="0" width="900" height="40" fill="url(#scanGrad)" rx="12">
    <animateTransform attributeName="transform" type="translate" values="0,-40;0,250;0,-40" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Border glow -->
  <rect x="1" y="1" width="898" height="248" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" rx="12" opacity="0.6"/>

  <!-- Left decorative element — beacon pulse -->
  <g transform="translate(80, 125)">
    <circle r="35" fill="none" stroke="#ff6ec7" stroke-width="1" opacity="0.3">
      <animate attributeName="r" values="25;40;25" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle r="25" fill="none" stroke="#a77de5" stroke-width="1" opacity="0.4">
      <animate attributeName="r" values="20;30;20" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.15;0.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle r="15" fill="none" stroke="#5eead4" stroke-width="1.5" opacity="0.6">
      <animate attributeName="r" values="12;20;12" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Center diamond -->
    <polygon points="0,-10 10,0 0,10 -10,0" fill="#ff6ec7" opacity="0.8" filter="url(#glow)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </polygon>
    <!-- Orbital dots -->
    <circle r="2.5" fill="#5eead4" filter="url(#subtleGlow)">
      <animateMotion dur="6s" repeatCount="indefinite" path="M0,0 A25,25 0 1,1 0.1,0"/>
    </circle>
    <circle r="2" fill="#7b8cff" filter="url(#subtleGlow)">
      <animateMotion dur="4.5s" repeatCount="indefinite" path="M0,0 A18,18 0 1,0 0.1,0"/>
    </circle>
  </g>

  <!-- Title -->
  <text x="450" y="80" text-anchor="middle" font-family="'Segoe UI','SF Pro Display',system-ui,sans-serif" font-weight="800" font-size="42" fill="url(#titleGrad)" filter="url(#subtleGlow)" letter-spacing="2">
    KimiK0
  </text>

  <!-- Subtitle -->
  <text x="450" y="115" text-anchor="middle" font-family="'SF Mono','Cascadia Code',monospace" font-size="14" fill="#7b8cff" letter-spacing="4" opacity="0.9">
    CS DISSECTION ENGINE
  </text>

  <!-- Version badge -->
  <g transform="translate(450, 145)">
    <rect x="-35" y="-12" width="70" height="24" rx="12" fill="#1a1a3a" stroke="#5eead4" stroke-width="1" opacity="0.8"/>
    <text x="0" y="5" text-anchor="middle" font-family="monospace" font-size="12" fill="#5eead4" font-weight="bold">ver 5.2.0</text>
  </g>

  <!-- Description -->
  <text x="450" y="185" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#8b8ba7" letter-spacing="1">
    CobaltStrike Beacon Shellcode Aggregation &amp; Dissection Framework
  </text>

  <!-- Feature pills -->
  <g transform="translate(450, 215)">
    <!-- Version-Adaptive -->
    <rect x="-295" y="-11" width="115" height="22" rx="11" fill="none" stroke="#5eead4" stroke-width="0.8" opacity="0.6"/>
    <text x="-238" y="4" text-anchor="middle" font-family="monospace" font-size="10" fill="#5eead4">Version-Adaptive</text>
    <!-- Event-Driven -->
    <rect x="-165" y="-11" width="100" height="22" rx="11" fill="none" stroke="#7b8cff" stroke-width="0.8" opacity="0.6"/>
    <text x="-115" y="4" text-anchor="middle" font-family="monospace" font-size="10" fill="#7b8cff">Event-Driven</text>
    <!-- 9 Plugins -->
    <rect x="-50" y="-11" width="100" height="22" rx="11" fill="none" stroke="#a77de5" stroke-width="0.8" opacity="0.6"/>
    <text x="0" y="4" text-anchor="middle" font-family="monospace" font-size="10" fill="#a77de5">9 Plugins</text>
    <!-- IOC Engine -->
    <rect x="65" y="-11" width="100" height="22" rx="11" fill="none" stroke="#d35fd6" stroke-width="0.8" opacity="0.6"/>
    <text x="115" y="4" text-anchor="middle" font-family="monospace" font-size="10" fill="#d35fd6">IOC Engine</text>
    <!-- OPSEC Audit -->
    <rect x="180" y="-11" width="110" height="22" rx="11" fill="none" stroke="#ff6ec7" stroke-width="0.8" opacity="0.6"/>
    <text x="235" y="4" text-anchor="middle" font-family="monospace" font-size="10" fill="#ff6ec7">OPSEC Advisor</text>
  </g>

  <!-- Right decorative — hex stream -->
  <g transform="translate(790, 60)" opacity="0.4">
    <text font-family="monospace" font-size="9" fill="#5eead4">
      <tspan x="0" dy="0">4D 5A 41 52</tspan>
      <tspan x="0" dy="14">55 48 89 E5</tspan>
      <tspan x="0" dy="14">48 83 EC 20</tspan>
      <tspan x="0" dy="14">FF 15 ?? ??</tspan>
      <tspan x="0" dy="14">00 01 00 01</tspan>
      <tspan x="0" dy="14">0F 05 C3 90</tspan>
    </text>
    <rect x="-5" y="-5" width="85" height="95" fill="none" stroke="#5eead4" stroke-width="0.5" rx="4" opacity="0.3"/>
    <!-- Scan highlight -->
    <rect x="-5" y="0" width="85" height="12" fill="#5eead4" opacity="0.05" rx="2">
      <animate attributeName="y" values="-5;80;-5" dur="3s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
