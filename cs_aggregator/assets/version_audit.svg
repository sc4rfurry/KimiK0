  <text x="140" y="72" font-family="monospace" font-size="12" fill="#e0e0e0" font-weight="bold">CobaltStrike 4.9.1</text>
  <text x="330" y="72" font-family="monospace" font-size="11" fill="#555">│</text>
  <text x="345" y="72" font-family="monospace" font-size="12" fill="#7b8cff" font-weight="bold">31</text>
  <text x="365" y="72" font-family="monospace" font-size="11" fill="#555">features tracked</text>
  <text x="510" y="72" font-family="monospace" font-size="11" fill="#555">│</text>
  <text x="525" y="72" font-family="monospace" font-size="12" fill="#5eead4" font-weight="bold">18</text>
  <text x="545" y="72" font-family="monospace" font-size="11" fill="#555">available</text>

  <!-- Feature Utilization Gauge -->
  <text x="60" y="102" font-family="monospace" font-size="11" fill="#fbbf24" font-weight="bold">◆</text>
  <text x="78" y="102" font-family="monospace" font-size="11" fill="#555">Feature Utilization</text>
  <!-- Bar background -->
  <rect x="280" y="90" width="240" height="14" rx="2" fill="#1a1a3a"/>
  <!-- Bar fill (33%) -->
  <rect x="280" y="90" width="80" height="14" rx="2" fill="#fbbf24" opacity="0.8"/>
  <text x="535" y="102" font-family="monospace" font-size="12" fill="#fbbf24" font-weight="bold">33%</text>
  <text x="575" y="102" font-family="monospace" font-size="10" fill="#fbbf24">MODERATE</text>

  <!-- Hardening Score Gauge -->
  <text x="60" y="124" font-family="monospace" font-size="11" fill="#5eead4" font-weight="bold">◈</text>
  <text x="78" y="124" font-family="monospace" font-size="11" fill="#555">Hardening Score</text>
  <rect x="280" y="112" width="240" height="14" rx="2" fill="#1a1a3a"/>
  <rect x="280" y="112" width="230" height="14" rx="2" fill="url(#gaugeG)" opacity="0.8"/>
  <text x="535" y="124" font-family="monospace" font-size="12" fill="#5eead4" font-weight="bold">96%</text>
  <text x="575" y="124" font-family="monospace" font-size="10" fill="#5eead4" font-weight="bold">EXCELLENT</text>

  <!-- Stat badges -->
  <text x="60" y="152" font-family="monospace" font-size="10" fill="#555">┌─ ✓ Active: <tspan fill="#5eead4" font-weight="bold">6</tspan>/18 ─┬─ ✗ Unused: <tspan fill="#7b8cff" font-weight="bold">12</tspan> ─┬─ ◇ Upgrade: <tspan fill="#d35fd6" font-weight="bold">13</tspan> ─┬─ ⚠ OPSEC: <tspan fill="#f87171" font-weight="bold">2</tspan> ─┘</text>

  <line x1="30" y1="168" x2="870" y2="168" stroke="#333" stroke-width="0.5"/>

