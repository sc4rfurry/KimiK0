<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 780">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/><stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="ac2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5eead4"/><stop offset="25%" style="stop-color:#7b8cff"/>
      <stop offset="50%" style="stop-color:#a77de5"/><stop offset="75%" style="stop-color:#d35fd6"/><stop offset="100%" style="stop-color:#ff6ec7"/>
    </linearGradient>
    <linearGradient id="gaugeG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5eead4"/><stop offset="50%" style="stop-color:#7b8cff"/><stop offset="100%" style="stop-color:#a77de5"/>
    </linearGradient>
    <pattern id="gr2" width="25" height="25" patternUnits="userSpaceOnUse">
      <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#1a1a3a" stroke-width="0.3"/>
    </pattern>
    <filter id="g2"><feGaussianBlur stdDeviation="1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="900" height="780" fill="url(#bg2)" rx="10"/>
  <rect width="900" height="780" fill="url(#gr2)" rx="10"/>
  <rect x="1" y="1" width="898" height="778" fill="none" stroke="url(#ac2)" stroke-width="1" rx="10" opacity="0.3"/>

  <!-- Header -->
