  <text x="40" y="534" font-family="monospace" font-size="13" fill="#f87171" font-weight="bold">⊕ OPSEC FINDINGS</text>
  <text x="230" y="534" font-family="monospace" font-size="11" fill="#555">─ 2 issues detected</text>
  <line x1="40" y1="544" x2="860" y2="544" stroke="#555" stroke-width="0.5"/>

  <!-- Finding 1 -->
  <g font-family="monospace" font-size="11">
    <rect x="60" y="554" width="35" height="16" rx="3" fill="#1a1a3a" stroke="#5eead4" stroke-width="0.5"/>
    <text x="78" y="566" text-anchor="middle" fill="#5eead4" font-weight="bold" font-size="9">LOW</text>
    <text x="108" y="566" fill="#e0e0e0" font-weight="bold">No Kill Date Set</text>
    <text x="80" y="584" fill="#555">│ Beacon has no expiration — risks long-term unauthorized access.</text>
    <text x="80" y="602" fill="#5eead4">└─ ↳</text><text x="120" y="602" fill="#5eead4" font-weight="bold">Set a kill date to auto-terminate Beacon after engagement window.</text>
  </g>

  <!-- Finding 2 -->
  <g font-family="monospace" font-size="11">
    <rect x="60" y="618" width="40" height="16" rx="3" fill="#1a1a3a" stroke="#555" stroke-width="0.5"/>
    <text x="80" y="630" text-anchor="middle" fill="#555" font-weight="bold" font-size="9">INFO</text>
    <text x="112" y="630" fill="#e0e0e0" font-weight="bold">Beacon Data Store Not Configured</text>
    <text x="80" y="648" fill="#555">│ BOFs/.NET assemblies resent every execution — extra network traffic.</text>
    <text x="80" y="666" fill="#5eead4">└─ ↳</text><text x="120" y="666" fill="#5eead4" font-weight="bold">Set data_store_size > 0 to cache in Beacon memory.</text>
  </g>

  <line x1="30" y1="682" x2="870" y2="682" stroke="#333" stroke-width="0.5"/>

  <!-- Upgrade Roadmap (compact) -->
  <text x="40" y="706" font-family="monospace" font-size="13" fill="#d35fd6" font-weight="bold">⟐ UPGRADE ROADMAP</text>
  <text x="250" y="706" font-family="monospace" font-size="11" fill="#555">─ 13 features across 2 version(s)</text>
  <line x1="40" y1="716" x2="860" y2="716" stroke="#555" stroke-width="0.5"/>

  <g font-family="monospace" font-size="11">
    <text x="60" y="736" fill="#d35fd6">├──</text><text x="100" y="736" fill="#7b8cff" font-weight="bold">CS 4.10</text><text x="190" y="736" fill="#d35fd6" font-weight="bold">+6 features</text>
    <text x="60" y="754" fill="#555">│  ├─ →</text><text x="130" y="754" fill="#e0e0e0">BeaconGate</text><text x="300" y="754" fill="#555">Proxy API calls through sleep mask</text>
    <text x="60" y="768" fill="#555">│  └─ →</text><text x="130" y="768" fill="#e0e0e0">C2 Hot Swapping</text><text x="300" y="768" fill="#555">Dynamic C2 host changes</text>
  </g>
