  <line x1="40" y1="200" x2="860" y2="200" stroke="#555" stroke-width="0.5"/>

  <!-- Evasion & Stealth -->
  <text x="60" y="222" font-family="monospace" font-size="12" fill="#5eead4" font-weight="bold">◈ Evasion &amp; Stealth</text>
  <!-- Mini bar -->
  <rect x="260" y="211" width="64" height="10" rx="2" fill="#1a1a3a"/>
  <rect x="260" y="211" width="43" height="10" rx="2" fill="#5eead4" opacity="0.6"/>
  <text x="332" y="220" font-family="monospace" font-size="9" fill="#555">6/9</text>

  <g font-family="monospace" font-size="11">
    <text x="80" y="242" fill="#5eead4" font-weight="bold">✓</text><text x="100" y="242" fill="#e0e0e0" font-weight="bold">Sleep Mask (Heap Masking)</text><text x="480" y="242" fill="#555">Mask/unmask Beacon heap during sleep</text>
    <text x="80" y="260" fill="#5eead4" font-weight="bold">✓</text><text x="100" y="260" fill="#e0e0e0" font-weight="bold">Indirect Syscalls</text><text x="480" y="260" fill="#555">Jump to ntdll for stealth</text>
    <text x="80" y="278" fill="#5eead4" font-weight="bold">✓</text><text x="100" y="278" fill="#e0e0e0" font-weight="bold">Sleep Mask 16KB + Stack Spoofing</text><text x="480" y="278" fill="#555">Evasive sleep via stack spoofing (x64)</text>
    <text x="80" y="296" fill="#5eead4" font-weight="bold">✓</text><text x="100" y="296" fill="#e0e0e0" font-weight="bold">Post-Ex Memory Cleanup</text><text x="480" y="296" fill="#555">Free reflective DLL after init</text>
    <text x="80" y="314" fill="#5eead4" font-weight="bold">✓</text><text x="100" y="314" fill="#e0e0e0" font-weight="bold">CFG-Caution Mode</text><text x="480" y="314" fill="#555">Control Flow Guard compatibility</text>
    <text x="80" y="332" fill="#f87171">✗</text><text x="100" y="332" fill="#555">Direct Syscalls</text><text x="480" y="332" fill="#555" font-style="italic">Bypass API hooking via Nt*</text>
    <text x="80" y="350" fill="#f87171">✗</text><text x="100" y="350" fill="#555">BOF Memory Options</text><text x="480" y="350" fill="#555" font-style="italic">VirtualAlloc/HeapAlloc/MapViewOfFile</text>
    <text x="80" y="368" fill="#555">⊘</text><text x="100" y="368" fill="#555" text-decoration="line-through">BeaconGate</text><text x="480" y="368" fill="#555">requires CS 4.10</text>
    <text x="80" y="386" fill="#555">⊘</text><text x="100" y="386" fill="#555" text-decoration="line-through">Novel Sleepmask (Auto)</text><text x="480" y="386" fill="#555">requires CS 4.11</text>
  </g>

  <!-- Injection -->
  <text x="60" y="414" font-family="monospace" font-size="12" fill="#f87171" font-weight="bold">⊕ Process Injection</text>
  <rect x="260" y="403" width="64" height="10" rx="2" fill="#1a1a3a"/>
  <rect x="260" y="403" width="0" height="10" rx="2" fill="#f87171" opacity="0.6"/>
  <text x="332" y="412" font-family="monospace" font-size="9" fill="#555">0/1</text>
  <g font-family="monospace" font-size="11">
    <text x="80" y="432" fill="#fbbf24">·</text><text x="100" y="432" fill="#888">Process Injection Hooks</text><text x="480" y="432" fill="#555" font-style="italic">PROCESS_INJECT Aggressor hooks</text>
  </g>

  <!-- Communications -->
  <text x="60" y="456" font-family="monospace" font-size="12" fill="#7b8cff" font-weight="bold">◇ Communications</text>
  <rect x="260" y="445" width="64" height="10" rx="2" fill="#1a1a3a"/>
  <text x="332" y="454" font-family="monospace" font-size="9" fill="#555">0/2</text>
  <g font-family="monospace" font-size="11">
    <text x="80" y="474" fill="#fbbf24">·</text><text x="100" y="474" fill="#888">WinHTTP Library</text><text x="480" y="474" fill="#555" font-style="italic">Alternative to WinInet</text>
    <text x="80" y="492" fill="#fbbf24">·</text><text x="100" y="492" fill="#888">Per-Host C2 Profiles</text><text x="480" y="492" fill="#555" font-style="italic">http-host-profiles customization</text>
  </g>

  <line x1="30" y1="510" x2="870" y2="510" stroke="#333" stroke-width="0.5"/>

